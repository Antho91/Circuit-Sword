# Default audio output = the USB sound card (card 1). HDMI audio stays available
# as card 0 for a future HDMI/Bluetooth audio routing feature. 'plug' allows
# automatic rate/format conversion so apps (EmulationStation, RetroArch) just work.
pcm.!default {
  type plug
  slave.pcm "hw:1,0"
}
ctl.!default {
  type hw
  card 1
}
