# Circuit Sword audio routing.
#
# With vc4-kms-v3d the HDMI audio (vc4hdmi) grabs ALSA index 0. The C-Media USB
# audio chip used to also request index 0 → collision ("cannot find the slot for
# index 0") → the USB sound card never appeared. Force the USB card to index 1
# instead: vc4hdmi stays card 0 (kept available for a future HDMI/Bluetooth audio
# feature) and the USB card is card 1. asound.conf then makes card 1 the default.
options snd-usb-audio index=1
