# RTL8723BS (r8723bs) WiFi stability tweaks for the Circuit Sword.
#
# This SDIO chip is notorious for intermittent disconnects, and it gets worse on
# 40MHz (HT40) channels. Two fixes:
#   rtw_power_mgnt=0  disable 802.11 power management (LPS) — the main drop cause
#   rtw_ips_mode=0    disable inactive power save (don't power down the radio idle)
#   rtw_bw_mode=0     cap channel width to 20MHz (low nibble = 2.4GHz; 0 = 20MHz).
#                     Trades a little peak throughput for a stable link, since
#                     HT40 on this chip is unreliable.
options r8723bs rtw_power_mgnt=0 rtw_ips_mode=0 rtw_bw_mode=0
