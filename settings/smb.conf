#
# Circuit Sword Samba config — network shares for the RetroPie folders.
# Installed to /etc/samba/smb.conf by the image assembler.
# Browse to \\CircuitSword\ from your Mac/PC to copy/delete ROMs, BIOS, etc.
# All access maps to the pi user (owns the folders) → full read/write/delete.
#
[global]
   workgroup = WORKGROUP
   server string = Circuit Sword
   netbios name = CIRCUITSWORD
   security = user
   map to guest = Bad User
   guest account = pi
   log file = /var/log/samba/log.%m
   max log size = 50
   server min protocol = SMB2
   # Avoid the slow master-browser election on small networks
   local master = no
   preferred master = no

[roms]
   comment = RetroPie ROMs
   path = /home/pi/RetroPie/roms
   browseable = yes
   writeable = yes
   guest ok = yes
   create mask = 0644
   directory mask = 0755
   force user = pi

[bios]
   comment = RetroPie BIOS
   path = /home/pi/RetroPie/BIOS
   browseable = yes
   writeable = yes
   guest ok = yes
   create mask = 0644
   directory mask = 0755
   force user = pi

[configs]
   comment = RetroPie configs
   path = /opt/retropie/configs
   browseable = yes
   writeable = yes
   guest ok = yes
   create mask = 0644
   directory mask = 0755
   force user = pi

[splashscreens]
   comment = RetroPie splashscreens
   path = /home/pi/RetroPie/splashscreens
   browseable = yes
   writeable = yes
   guest ok = yes
   create mask = 0644
   directory mask = 0755
   force user = pi
