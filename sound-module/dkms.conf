PACKAGE_NAME="snd-usb-audio"
PACKAGE_VERSION="0.1"
MAKE="make -f Makefile.dkms"
CLEAN="make -f Makefile.dkms clean"
BUILT_MODULE_NAME="snd-usb-audio"
DEST_MODULE_LOCATION="/kernel/sound/usb"
REMAKE_INITRD="no"
# AUTOINSTALL is OFF on purpose. This volume-fix module does not build on newer
# kernels (e.g. 6.18) yet, and with autoinstall ON its failed rebuild makes every
# apt/kernel operation return non-zero — which poisoned the first-boot flow and
# stopped the RTL8723BS WiFi module from registering. Keep it off until the
# module is actually ported; WiFi (rtl8723bs) must not depend on it.
AUTOINSTALL="no"
