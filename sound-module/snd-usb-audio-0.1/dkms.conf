PACKAGE_NAME="snd-usb-audio"
PACKAGE_VERSION="0.1"
MAKE="make"
CLEAN="make clean"
BUILT_MODULE_NAME="snd-usb-audio"
DEST_MODULE_LOCATION="/kernel/sound/usb"
REMAKE_INITRD="no"
# AUTOINSTALL off: this module doesn't build on newer kernels (6.18) yet, and a
# failed autoinstall returns non-zero on every apt/kernel op — which blocked the
# RTL8723BS WiFi DKMS registration during first boot. Off until it's ported.
AUTOINSTALL="no"
