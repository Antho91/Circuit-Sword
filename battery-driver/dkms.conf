# DKMS configuration for the cs_battery virtual battery module.
#
# Registered at first boot alongside rtl8723bs. AUTOINSTALL=yes means the stock
# kernel's postinst.d/dkms hook rebuilds it whenever 'apt full-upgrade' installs
# a new kernel — so RetroArch's in-game battery indicator survives kernel updates
# (same mechanism as the WiFi driver).
#
# No BUILD_EXCLUSIVE_KERNEL: unlike rtl8723bs (built into the custom CS kernel),
# cs_battery is never in-tree, so it must build for whatever kernel is installed.
# The transient first-boot custom kernel simply runs without it (no gaming then).

PACKAGE_NAME="cs-battery"
PACKAGE_VERSION="0.1.0"

BUILT_MODULE_NAME[0]="cs_battery"
BUILT_MODULE_LOCATION[0]="."

# Install into /updates/dkms/ — modprobe searches updates/ first.
DEST_MODULE_LOCATION[0]="/updates/dkms"

MAKE[0]="make KSRC=/lib/modules/${kernelver}/build"
CLEAN="make KSRC=/lib/modules/${kernelver}/build clean"

AUTOINSTALL="yes"
