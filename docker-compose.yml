# ============================================================
# Circuit Sword build system
#
# Stages (use build.sh for easy orchestration):
#
#   retropie   — Build base RetroPie .img (very slow, ~1h, rarely needed)
#   kernel     — Cross-compile custom 64-bit kernel (no loop device needed)
#   hud        — Build cs-hud_new ARM64 binary    (no loop device needed)
#   assembler  — Mount image, inject kernel+hud, configure (privileged)
#
# Quick examples:
#   ./build.sh all           # Full build from scratch
#   ./build.sh kernel        # Rebuild kernel only
#   ./build.sh hud           # Rebuild HUD binary only
#   ./build.sh software      # Re-run assembler (kernel+hud must exist)
# ============================================================

services:

  # ----------------------------------------------------------
  # Stage 0: Build base RetroPie image
  # Very heavy — only run when you need a fresh base image.
  # ----------------------------------------------------------
  retropie:
    build:
      context: .
      dockerfile: docker/Dockerfile.base
    image: cs-build-base
    profiles: ["retropie"]
    privileged: true
    volumes:
      - ./output:/output
      - ./build:/build-scripts:ro
      - /dev:/dev
    working_dir: /build-scripts
    command: >
      bash -c "bash 1_build_retropie.sh && cp rp_build_image/tmp/build/image/rpios-bookworm.img /output/"
    environment:
      - DEBIAN_FRONTEND=noninteractive

  # ----------------------------------------------------------
  # Stage 1: Cross-compile the custom kernel
  # Outputs to output/kernel/ — no loop device needed.
  # Source is cached in a named volume between runs.
  # ----------------------------------------------------------
  kernel:
    build:
      context: .
      dockerfile: docker/Dockerfile.kernel
    image: cs-build-kernel
    profiles: ["kernel", "all"]
    volumes:
      - ./output:/output
      - kernel-cache:/cache
    environment:
      KERNEL_BRANCH: ${KERNEL_BRANCH:-rpi-6.12.y}
      KERNEL_NAME:   ${KERNEL_NAME:-kernel8}
      CACHE_DIR:     /cache/linux

  # ----------------------------------------------------------
  # Stage 2: Build cs-hud_new ARM64 binary
  # Uses QEMU on x86_64 via Docker buildx.
  # ----------------------------------------------------------
  hud:
    build:
      context: .
      dockerfile: docker/Dockerfile.hud
      platforms:
        - linux/arm64
    image: cs-build-hud
    profiles: ["hud", "all"]
    volumes:
      - ./output:/output

  # ----------------------------------------------------------
  # Stage 3: Assemble the final image
  # Requires kernel + hud artifacts in output/.
  # Needs --privileged for loop device mounting.
  # ----------------------------------------------------------
  assembler:
    build:
      context: .
      dockerfile: docker/Dockerfile.assembler
    image: cs-build-assembler
    profiles: ["software", "all"]
    privileged: true
    volumes:
      - ./output:/output
      - .:/workspace:ro
      - /dev:/dev
    environment:
      KERNEL_NAME: ${KERNEL_NAME:-kernel8}
    depends_on:
      kernel:
        condition: service_completed_successfully
        required: false
      hud:
        condition: service_completed_successfully
        required: false

volumes:
  # Persists kernel source between builds (~1.5 GB, saves re-downloading)
  kernel-cache:
    name: cs-kernel-cache
