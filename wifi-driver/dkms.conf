# DKMS configuration for RTL8723BS WiFi driver
# Source: Raspberry Pi kernel staging tree
#   drivers/staging/rtl8723bs
#   https://github.com/raspberrypi/linux/tree/rpi-6.12.y/drivers/staging/rtl8723bs
#
# DKMS rebuilds this module automatically on kernel update, provided the kernel
# headers are installed. On Trixie that's the linux-headers-rpi-v8 / -2712
# metapackages (NOT raspberrypi-kernel-headers, which no longer exists) — the
# first-boot installer pulls them so a future kernel upgrade has matching headers.

PACKAGE_NAME="rtl8723bs"
PACKAGE_VERSION="1.0.0"

BUILT_MODULE_NAME[0]="r8723bs"
BUILT_MODULE_LOCATION[0]="."

# Install into /updates/dkms/ — modprobe searches updates/ before
# kernel/staging/, so our module always takes priority.
DEST_MODULE_LOCATION[0]="/updates/dkms"

# Delegate to our wrapper Makefile which passes CONFIG_RTL8723BS=m
# to the kernel build system (required for staging tree Makefiles).
# NOTE: no -j here on purpose — the CM3 has only 1GB RAM and parallel cc1
# processes OOM-kill the compiler when building on-device. dkms parallelism is
# capped to 1 via /etc/dkms/framework.conf (set up by the first-boot installer).
MAKE[0]="make KSRC=/lib/modules/${kernelver}/build"
CLEAN="make KSRC=/lib/modules/${kernelver}/build clean"

AUTOINSTALL="yes"

# Only build for STOCK Raspberry Pi kernels (their version string contains
# "rpt-rpi", e.g. 6.18.33+rpt-rpi-v8). The CUSTOM Circuit Sword kernel
# (6.12.91-v8-cs+) already has r8723bs built IN-kernel, so a DKMS build there
# just drops a second .ko in updates/dkms/ that OVERRIDES (and shadows) the
# working in-kernel driver — and since this source carries the cfg80211-6.18
# patch it doesn't even fit 6.12, so the override fails to load → WiFi dies on the
# next reboot. Excluding the custom kernel keeps it on the in-kernel driver and
# lets DKMS handle only stock kernels pulled by 'apt full-upgrade'.
BUILD_EXCLUSIVE_KERNEL="rpt-rpi"
